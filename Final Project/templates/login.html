{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}

<div class="edit-container login-container">

    <!-- Page Header -->
    <h2>Login</h2>

    <!-- Login Form -->
    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">🚀 Access Account</button>

        <!-- Forgot Password -->
        <div class="forgot-pass">
            <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
        </div>

        <p class="text-center mt-3">
            No account? <a href="{{ url_for('signup') }}">Create One</a>
        </p>
    </form>
</div>

<style>
/* Container */
.login-container {
    max-width: 420px;
    margin: 80px auto;
    padding: 35px 30px;
    background: #111;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
    color: #fff;
    font-family: 'Poppins', sans-serif;
}

/* Header */
.login-container h2 {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 25px;
    color: #60a5fa;
    text-shadow: 0 0 5px #3b82f6;
}

/* Inputs */
.login-container input[type="email"],
.login-container input[type="password"] {
    width: 100%;
    padding: 12px 15px;
    margin-bottom: 20px;
    border-radius: 12px;
    border: 2px solid #3b82f6;
    background: #1e293b;
    color: #fff;
    font-size: 1rem;
    transition: all 0.3s ease;
}

.login-container input:focus {
    outline: none;
    border-color: #60a5fa;
    box-shadow: 0 0 10px #3b82f6;
}

/* Button */
.login-container button {
    width: 100%;
    padding: 14px;
    font-size: 1rem;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #3b82f6, #60a5fa);
    color: #fff;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-bottom: 15px; /* add space below button */
}

.login-container button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 15px #3b82f6, 0 0 25px #60a5fa;
}

/* Forgot Password */
.forgot-pass {
    text-align: right;
    margin-top: 5px;
    margin-bottom: 20px; /* increased margin for spacing */
}

.forgot-pass a {
    color: #60a5fa;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.3s ease;
}

.forgot-pass a:hover {
    color: #3b82f6;
    text-decoration: underline;
}

/* Paragraph Links */
.login-container p {
    color: #fff;
    text-align: center;
    font-size: 0.95rem;
}

.login-container p a {
    color: #60a5fa;
    text-decoration: none;
}

.login-container p a:hover {
    color: #3b82f6;
    text-decoration: underline;
}

/* Responsive */
@media(max-width: 576px){
    .login-container {
        margin: 40px 15px;
        padding: 25px 15px;
    }
    .login-container h2 {
        font-size: 1.8rem;
    }
}
</style>

{% endblock %}
