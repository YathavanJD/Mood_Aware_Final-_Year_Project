{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="edit-container reset-container">
    <h2>Set New Password</h2>
    <form method="POST">
        <input type="password" name="password" placeholder="Enter new password" required>
        <button type="submit">Reset Password</button>
    </form>
</div>

<style>
.reset-container {
    max-width: 420px;
    margin: 80px auto;
    padding: 35px 30px;
    background: #111;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
    color: #fff;
    font-family: 'Poppins', sans-serif;
}
.reset-container h2 {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 25px;
    color: #60a5fa;
    text-shadow: 0 0 5px #3b82f6;
}
.reset-container input {
    width: 100%;
    padding: 12px 15px;
    margin-bottom: 20px;
    border-radius: 12px;
    border: 2px solid #3b82f6;
    background: #1e293b;
    color: #fff;
    font-size: 1rem;
}
.reset-container input:focus {
    outline: none;
    border-color: #60a5fa;
    box-shadow: 0 0 10px #3b82f6;
}
.reset-container button {
    width: 100%;
    padding: 14px;
    font-size: 1rem;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #3b82f6, #60a5fa);
    color: #fff;
    cursor: pointer;
    transition: all 0.3s ease;
}
.reset-container button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 15px #3b82f6, 0 0 25px #60a5fa;
}
</style>
{% endblock %}
