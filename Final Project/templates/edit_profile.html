{% extends "base.html" %}
{% block content %}

<style>
/* Container */
.edit-container {
    max-width: 500px;
    margin: 60px auto;
    padding: 30px 25px;
    background: #111;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
    color: #fff;
    font-family: 'Poppins', sans-serif;
}

/* Header */
.edit-container h2 {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 20px;
    color: #60a5fa;
    text-shadow: 0 0 5px #3b82f6, 0 0 10px #60a5fa;
}

/* Inputs */
.edit-container input[type="text"],
.edit-container input[type="email"],
.edit-container input[type="password"],
.edit-container input[type="file"] {
    width: 100%;
    padding: 12px 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 2px solid #3b82f6;
    background: #1e293b;
    color: #fff;
    font-size: 1rem;
    transition: all 0.3s ease;
}

.edit-container input:focus {
    outline: none;
    border-color: #60a5fa;
    box-shadow: 0 0 10px #3b82f6, 0 0 20px #60a5fa;
}

/* Submit Button */
.edit-container button {
    width: 100%;
    padding: 12px;
    font-size: 1rem;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    background: linear-gradient(45deg, #3b82f6, #60a5fa);
    color: #fff;
    cursor: pointer;
    transition: all 0.3s ease;
}

.edit-container button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #3b82f6, 0 0 25px #60a5fa;
}

/* Error Text */
.error-text {
    color: #ff4d4d;
    font-size: 0.9rem;
    margin-top: -10px;
    margin-bottom: 10px;
}

/* Profile Image Preview */
.profile-preview {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    display: block;
    margin: 0 auto 15px;
    object-fit: cover;
    border: 2px solid #3b82f6;
}

/* Responsive */
@media(max-width: 576px){
    .edit-container {
        margin: 30px 15px;
        padding: 20px 15px;
    }
}
</style>

<div class="edit-container">
    <h2>Edit Profile</h2>

    <!-- Profile Image Preview -->
    <img src="{% if user.profile_image %}{{ url_for('static', filename='uploads/' ~ user.profile_image) }}{% else %}{{ url_for('static', filename='default_user.png') }}{% endif %}"
         alt="Profile Image" class="profile-preview">

    <form method="POST" enctype="multipart/form-data" onsubmit="return validateEdit()">

        <input type="text" name="username" value="{{ user.username }}" placeholder="Username" required>
        <input type="email" name="email" value="{{ user.email }}" placeholder="Email" required>
        
        <input type="password" name="password" id="newpass" placeholder="New Password (optional)" onkeyup="validatePassword()">
        <div id="passError" class="error-text"></div>
        
        <input type="file" name="profile_image" accept="image/*">

        <button type="submit">💾 Apply Updates</button>
    </form>
</div>

<script>
function validateEdit(){
    let pass = document.getElementById("newpass").value;
    if(pass && pass.length < 6){
        document.getElementById("passError").innerText = "Password must be 6+ characters";
        return false;
    }
    return true;
}

function validatePassword(){
    let pass = document.getElementById("newpass").value;
    let regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

    if(pass && !regex.test(pass)){
        document.getElementById("passError").innerText =
            "Password must contain 8+ chars, uppercase, lowercase, number & special char";
    } else {
        document.getElementById("passError").innerText = "";
    }
}
</script>

{% endblock %}
